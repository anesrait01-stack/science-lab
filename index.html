<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مخبر العلوم</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
header{padding:20px;text-align:center;background:#1e293b}
input{width:80%;padding:12px;margin:10px;border-radius:10px;border:none}
.container{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding:10px}
.card{background:white;color:black;width:220px;padding:10px;border-radius:10px}
a{text-decoration:none;color:black}
.level{font-size:12px;color:gray}
</style>
</head>
<body>

<header>
<h1>🧪 مخبر العلوم</h1>
<p>اضغط على أي تجربة لفتح التفاصيل</p>
</header>

<input id="search" placeholder="ابحث..." oninput="render()">

<div class="container" id="list"></div>

<script src="data.js"></script>

<script>

function render(){

let val=document.getElementById("search").value.toLowerCase();
let list=document.getElementById("list");
list.innerHTML="";

experiments
.filter(e=>e.name.toLowerCase().includes(val)||e.level.includes(val))
.forEach(e=>{

list.innerHTML+=`
<a href="experiment.html?id=${e.id}">
<div class="card">
<h3>${e.name}</h3>
<div class="level">${e.level}</div>
</div>
</a>
`;

});

}

render();

</script>

</body>
</html>

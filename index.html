<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مخبر العلوم</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f7fb;
text-align:center;
}

header{
background:#1e88e5;
color:white;
padding:20px;
}

.card{
background:white;
margin:10px auto;
padding:15px;
width:80%;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
cursor:pointer;
text-align:right;
}

.card:hover{
transform:scale(1.02);
transition:0.2s;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
width:80%;
border-radius:10px;
text-align:right;
max-height:85%;
overflow:auto;
}

.close{
float:left;
cursor:pointer;
font-size:20px;
}

img{
width:100%;
margin-top:10px;
border-radius:10px;
}

iframe{
width:100%;
height:300px;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>🧪 مخبر العلوم</h1>
<p>اضغط على تجربة لرؤية الشرح والفيديو</p>
</header>

<!-- التجارب -->

<div class="card" onclick="openModal(
'تجربة البركان',
'تفاعل الخل مع البيكربونات ينتج فوران يشبه البركان.',
'https://upload.wikimedia.org/wikipedia/commons/3/3c/Vinegar_and_baking_soda_reaction.jpg',
'https://www.youtube.com/embed/5a5u3g3qk4A'
)">
<h3>🌋 البركان</h3>
</div>

<div class="card" onclick="openModal(
'الكهرباء الساكنة',
'فرك بالون يولد شحنة كهربائية تجذب الورق.',
'https://upload.wikimedia.org/wikipedia/commons/3/3b/Static_electricity_balloon.jpg',
'https://www.youtube.com/embed/6P8x2p3k0wQ'
)">
<h3>⚡ الكهرباء الساكنة</h3>
</div>

<div class="card" onclick="openModal(
'المغناطيس',
'المغناطيس يجذب المعادن مثل الحديد.',
'https://upload.wikimedia.org/wikipedia/commons/2/2b/Magnet.jpg',
'https://www.youtube.com/embed/7pQ1m8y9x0A'
)">
<h3>🧲 المغناطيس</h3>
</div>

<!-- النافذة -->

<div id="modal" class="modal" onclick="closeModal(event)">
<div class="modal-content">
<span class="close" onclick="closeModal(event)">❌</span>

<h2 id="title"></h2>
<p id="desc"></p>

<img id="img">

<iframe id="video" frameborder="0" allowfullscreen></iframe>

</div>
</div>

<script>

function openModal(title,desc,img,video){
document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText=title;
document.getElementById("desc").innerText=desc;
document.getElementById("img").src=img;
document.getElementById("video").src=video;
}

function closeModal(e){
if(e.target.id==="modal" || e.target.className==="close"){
document.getElementById("modal").style.display="none";
document.getElementById("video").src="";
}
}

</script>

</body>
</html>

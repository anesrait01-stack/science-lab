<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مخبر العلوم</title>
<style>
body{

background:#f4f7fb;

}

header{
background:#1e88e5;
color:white;
padding:20px;
}

.card{
background:white;
margin:20px auto;
padding:15px;

border-radius:10px;

}
</style>
</head>

<body>

<header>
<h1>🧪 مخبر العلوم</h1>
<p>موقع التجارب العلمية</p>
</header>

<div class="card">
<h2>تجربة البركان</h2>
<p>خلط الخل مع البيكربونات لإنتاج فوران يشبه البركان.</p>
</div>

<div class="card">
<h2>تجربة الكهرباء الساكنة</h2>
<p>فرك بالون لجذب الورق الصغير.</p>
</div>

</body>
</html>
